slug: questionario_orientamento
title: Questionario di Orientamento
version: v1
locale: it

intro: |
  Questionario iniziale per orientare il percorso.
  Compila tutte le domande in modo sincero.

scoring:
  enabled: false

questions:
  - code: q1_diagnosi_attiva
    position: 3
    movement: Hai una diagnosi medica attiva?
    side: none
    kind: single_choice
    options:
      - value: "si"
      - value: "no"


  - code: q1b_quale_diagnosi
    position: 4
    movement: Se si, quale?
    side: none
    kind: open_text
    show_if:
      all:
        - question: q1_diagnosi_attiva
          operator: eq
          value: "si"

  - code: q2_dolore_patologia
    position: 1
    movement: Hai attualmente dolore o una patologia?
    side: none
    kind: single_choice
    options:
      - value: "no"
      - value: lieve
        label: Si, leggero
      - value: frequente
        label: Si, frequente
      - value: intenso
        label: Si, intenso o invalidante

  - code: q2b_da_quanto_tempo
    position: 2
    movement: Da quanto tempo?
    side: none
    kind: open_text
    show_if:
      all:
        - question: q2_dolore_patologia
          operator: in
          value:
            - lieve
            - frequente
            - intenso

  - code: q3_professionista_riferimento
    position: 5
    movement: Hai un professionista sanitario di riferimento (medico, fisioterapista)?
    side: none
    kind: single_choice
    options:
      - value: "no"
      - value: "si"

  - code: q3a_prof_nome_cognome
    position: 6
    movement: Nome e cognome del professionista di riferimento
    side: none
    kind: open_text
    show_if:
      all:
        - question: q3_professionista_riferimento
          operator: eq
          value: "si"

  - code: q3c_professione
    position: 7
    movement: Professione del professionista (es. medico, fisioterapista)
    side: none
    kind: open_text
    show_if:
      all:
        - question: q3_professionista_riferimento
          operator: eq
          value: "si"

  - code: q3d_prof_centro_localita
    position: 8
    movement: Nome del centro/studio + Paese / Citta e provincia
    side: none
    kind: open_text
    show_if:
      all:
        - question: q3_professionista_riferimento
          operator: eq
          value: "si"

  - code: q4_percorso_salute_attivo
    position: 9
    movement: Stai gia seguendo un percorso per la tua salute (palestra, nuoto, sport, ecc.)?
    side: none
    kind: single_choice
    options:
      - value: "no"
      - value: "si"

  - code: q5_trattamenti_benessere
    position: 10
    movement: Segui trattamenti per il tuo benessere (massaggi, estetista, shiatsu, tuina, altro)?
    side: none
    kind: single_choice
    options:
      - value: "no"
      - value: "si"

  - code: q6_discipline_movimento
    position: 11
    movement: Segui una disciplina di movimento (yoga, tai chi, arti marziali, Feldenkrais, metodiche posturali)?
    side: none
    kind: single_choice
    options:
      - value: "no"
      - value: "si"

  - code: q7_obiettivo_principale
    position: 12
    movement: Il tuo obiettivo principale e
    side: none
    kind: single_choice
    options:
      - value: patologia
        label: Risolvere un dolore o una patologia
      - value: performance
        label: Migliorare i risultati dei miei percorsi (benessere, allenamento, sport)
      - value: conoscenza
        label: Conoscere meglio il mio corpo
